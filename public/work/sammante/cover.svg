<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif">
  <defs>
    <radialGradient id="bg-glow" cx="65%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16161a"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
    <linearGradient id="chart-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="#0a0a0a"/>
  <rect width="1600" height="900" fill="url(#bg-glow)"/>

  <!-- left text panel -->
  <g transform="translate(80 280)">
    <text font-family="ui-monospace,Menlo,Consolas,monospace" font-size="22" font-weight="500" fill="#38bdf8" letter-spacing="6">SAAS · MULTI-TENANT</text>
    <text y="100" font-size="100" font-weight="700" fill="#fafafa" letter-spacing="-3">Sammanté</text>
    <text y="170" font-size="32" font-weight="500" fill="#a1a1aa">Health insurance platform</text>
    <text y="320" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="18" fill="#71717a">Apr 2025 – Jul 2025</text>
    <text y="350" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="18" fill="#71717a">Dhrubok Infotech Services</text>
  </g>

  <!-- dashboard mockup (right side) -->
  <g transform="translate(720 90)">
    <!-- window frame -->
    <rect x="0" y="0" width="800" height="720" rx="12" fill="#0f0f12" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- title bar -->
    <rect x="0" y="0" width="800" height="36" rx="12" fill="#16161a"/>
    <rect x="0" y="20" width="800" height="16" fill="#16161a"/>
    <circle cx="20" cy="18" r="5" fill="#3f3f46"/>
    <circle cx="40" cy="18" r="5" fill="#3f3f46"/>
    <circle cx="60" cy="18" r="5" fill="#3f3f46"/>
    <text x="400" y="23" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" fill="#71717a">portal.sammante.sn / dashboard</text>

    <!-- sidebar -->
    <rect x="0" y="36" width="180" height="684" fill="#0a0a0a"/>
    <text x="20" y="78" font-size="18" font-weight="700" fill="#fafafa">Sammanté<tspan fill="#38bdf8">.</tspan></text>
    <g font-size="14" fill="#a1a1aa">
      <rect x="12" y="120" width="156" height="32" rx="6" fill="rgba(56,189,248,0.1)"/>
      <text x="28" y="142" fill="#38bdf8">Overview</text>
      <text x="28" y="180" font-weight="400">Beneficiaries</text>
      <text x="28" y="216" font-weight="400">Policies</text>
      <text x="28" y="252" font-weight="400">Claims</text>
      <text x="28" y="288" font-weight="400">Billing</text>
      <text x="28" y="324" font-weight="400">Communication</text>
      <text x="28" y="360" font-weight="400">Reports</text>
    </g>

    <!-- main content -->
    <text x="208" y="80" font-size="20" font-weight="600" fill="#fafafa">Overview</text>
    <text x="208" y="100" font-size="12" fill="#71717a">Real-time across all tenants</text>

    <!-- stat cards -->
    <g transform="translate(208 124)">
      <rect width="180" height="92" rx="8" fill="url(#card-grad)" stroke="rgba(255,255,255,0.06)"/>
      <text x="16" y="32" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#71717a">BENEFICIARIES</text>
      <text x="16" y="64" font-size="28" font-weight="700" fill="#fafafa">12,418</text>
      <text x="16" y="82" font-size="10" fill="#10b981">+8.2% MoM</text>

      <rect x="196" width="180" height="92" rx="8" fill="url(#card-grad)" stroke="rgba(255,255,255,0.06)"/>
      <text x="212" y="32" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#71717a">CLAIMS / WK</text>
      <text x="212" y="64" font-size="28" font-weight="700" fill="#fafafa">847</text>
      <text x="212" y="82" font-size="10" fill="#10b981">+3.1%</text>

      <rect x="392" width="180" height="92" rx="8" fill="url(#card-grad)" stroke="rgba(255,255,255,0.06)"/>
      <text x="408" y="32" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#71717a">AUTO-PAID</text>
      <text x="408" y="64" font-size="28" font-weight="700" fill="#38bdf8">62%</text>
      <text x="408" y="82" font-size="10" fill="#a1a1aa">vs. 41% manual</text>
    </g>

    <!-- chart -->
    <g transform="translate(208 244)">
      <rect width="572" height="200" rx="8" fill="url(#card-grad)" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="28" font-size="13" font-weight="600" fill="#fafafa">Claims processed</text>
      <text x="20" y="46" font-size="10" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#71717a">LAST 30 DAYS</text>

      <!-- chart area -->
      <g transform="translate(20 70)">
        <path d="M 0 90 L 40 75 L 80 80 L 120 60 L 160 65 L 200 40 L 240 50 L 280 30 L 320 35 L 360 20 L 400 25 L 440 15 L 480 22 L 520 10 L 532 12 L 532 110 L 0 110 Z" fill="url(#chart-fill)"/>
        <path d="M 0 90 L 40 75 L 80 80 L 120 60 L 160 65 L 200 40 L 240 50 L 280 30 L 320 35 L 360 20 L 400 25 L 440 15 L 480 22 L 520 10 L 532 12" fill="none" stroke="#38bdf8" stroke-width="2"/>
        <line x1="0" y1="110" x2="532" y2="110" stroke="rgba(255,255,255,0.06)"/>
      </g>
    </g>

    <!-- recent activity -->
    <g transform="translate(208 472)" font-size="12">
      <rect width="572" height="220" rx="8" fill="url(#card-grad)" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="28" font-size="13" font-weight="600" fill="#fafafa">Recent claims</text>
      <g transform="translate(20 56)" fill="#a1a1aa">
        <circle cx="6" cy="-4" r="4" fill="#10b981"/>
        <text x="20" y="0" fill="#fafafa" font-weight="500">Claim #C-9821</text><text x="200" y="0">auto-paid · KYC matched</text><text x="430" y="0" fill="#71717a">2 min ago</text>
        <line y1="20" x2="532" y2="20" stroke="rgba(255,255,255,0.04)"/>

        <circle cx="6" cy="36" r="4" fill="#fbbf24"/>
        <text x="20" y="40" fill="#fafafa" font-weight="500">Claim #C-9820</text><text x="200" y="40">flagged · duplicate detected</text><text x="430" y="40" fill="#71717a">7 min ago</text>
        <line y1="60" x2="532" y2="60" stroke="rgba(255,255,255,0.04)"/>

        <circle cx="6" cy="76" r="4" fill="#10b981"/>
        <text x="20" y="80" fill="#fafafa" font-weight="500">Claim #C-9819</text><text x="200" y="80">auto-paid · verified</text><text x="430" y="80" fill="#71717a">12 min ago</text>
        <line y1="100" x2="532" y2="100" stroke="rgba(255,255,255,0.04)"/>

        <circle cx="6" cy="116" r="4" fill="#a1a1aa"/>
        <text x="20" y="120" fill="#fafafa" font-weight="500">Claim #C-9818</text><text x="200" y="120">manual review queued</text><text x="430" y="120" fill="#71717a">23 min ago</text>
        <line y1="140" x2="532" y2="140" stroke="rgba(255,255,255,0.04)"/>

        <circle cx="6" cy="156" r="4" fill="#10b981"/>
        <text x="20" y="160" fill="#fafafa" font-weight="500">Claim #C-9817</text><text x="200" y="160">auto-paid · verified</text><text x="430" y="160" fill="#71717a">31 min ago</text>
      </g>
    </g>
  </g>
</svg>
