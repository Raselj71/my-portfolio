<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif">
  <defs>
    <radialGradient id="bg-glow2" cx="35%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phone-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="#0a0a0a"/>
  <rect width="1600" height="900" fill="url(#bg-glow2)"/>

  <!-- left text panel -->
  <g transform="translate(80 280)">
    <text font-family="ui-monospace,Menlo,Consolas,monospace" font-size="22" font-weight="500" fill="#38bdf8" letter-spacing="6">REACT NATIVE · IOS / ANDROID</text>
    <text y="100" font-size="100" font-weight="700" fill="#fafafa" letter-spacing="-3">Task a Task</text>
    <text y="170" font-size="32" font-weight="500" fill="#a1a1aa">Quick capture, daily review</text>
    <text y="320" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="18" fill="#71717a">2025  ·  Local-first</text>
    <text y="350" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="18" fill="#71717a">Single-purpose screens</text>
  </g>

  <!-- phone frames (two side-by-side, slightly tilted) -->
  <g transform="translate(900 100)">
    <!-- back phone (slightly tilted, dimmer) -->
    <g transform="translate(280 50) rotate(8)" opacity="0.55">
      <rect x="0" y="0" width="220" height="440" rx="32" fill="#16161a" stroke="rgba(255,255,255,0.08)"/>
      <rect x="10" y="14" width="200" height="412" rx="22" fill="url(#phone-grad)"/>
    </g>

    <!-- front phone -->
    <g transform="translate(0 0) rotate(-4)">
      <rect x="0" y="0" width="280" height="560" rx="40" fill="#16161a" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
      <rect x="14" y="18" width="252" height="524" rx="28" fill="url(#phone-grad)"/>

      <!-- notch -->
      <rect x="105" y="20" width="70" height="20" rx="10" fill="#0a0a0a"/>

      <!-- status bar -->
      <text x="38" y="58" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#a1a1aa">9:41</text>
      <g transform="translate(220 50)" fill="#a1a1aa">
        <rect x="0" y="0" width="14" height="8" rx="1"/>
        <rect x="18" y="2" width="20" height="6" rx="1" stroke="#a1a1aa" fill="none"/>
        <rect x="20" y="4" width="14" height="2" fill="#a1a1aa"/>
      </g>

      <!-- header -->
      <text x="38" y="98" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#71717a" letter-spacing="2">FRIDAY · MAY 9</text>
      <text x="38" y="128" font-size="24" font-weight="700" fill="#fafafa">Today</text>
      <text x="38" y="148" font-size="11" fill="#a1a1aa">3 of 7 done</text>

      <!-- progress bar -->
      <rect x="38" y="160" width="204" height="4" rx="2" fill="#27272a"/>
      <rect x="38" y="160" width="88" height="4" rx="2" fill="#38bdf8"/>

      <!-- task list -->
      <g transform="translate(38 192)" font-size="13">
        <!-- done task -->
        <circle cx="10" cy="10" r="9" fill="#38bdf8"/>
        <path d="M 5 10 L 9 14 L 15 7" stroke="#0a0a0a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="14" fill="#52525b" text-decoration="line-through">Morning standup notes</text>

        <circle cx="10" cy="46" r="9" fill="#38bdf8"/>
        <path d="M 5 46 L 9 50 L 15 43" stroke="#0a0a0a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="50" fill="#52525b" text-decoration="line-through">Reply to design feedback</text>

        <circle cx="10" cy="82" r="9" fill="#38bdf8"/>
        <path d="M 5 82 L 9 86 L 15 79" stroke="#0a0a0a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="86" fill="#52525b" text-decoration="line-through">Push portfolio redesign</text>

        <!-- in progress (highlighted) -->
        <circle cx="10" cy="118" r="9" fill="none" stroke="#38bdf8" stroke-width="2"/>
        <text x="30" y="122" fill="#fafafa" font-weight="500">Ship Sammanté billing v2</text>
        <text x="30" y="138" font-size="10" fill="#71717a">due 4pm · 2 subtasks</text>

        <circle cx="10" cy="170" r="9" fill="none" stroke="#52525b"/>
        <text x="30" y="174" fill="#a1a1aa">Review chat-app PR</text>

        <circle cx="10" cy="206" r="9" fill="none" stroke="#52525b"/>
        <text x="30" y="210" fill="#a1a1aa">Call clinic</text>

        <circle cx="10" cy="242" r="9" fill="none" stroke="#52525b"/>
        <text x="30" y="246" fill="#a1a1aa">Plan tomorrow</text>
      </g>

      <!-- bottom tab bar -->
      <line x1="14" y1="478" x2="266" y2="478" stroke="rgba(255,255,255,0.06)"/>
      <g transform="translate(40 504)" fill="#a1a1aa">
        <text x="0" y="0" font-size="11" fill="#38bdf8" font-weight="600">Today</text>
        <text x="80" y="0" font-size="11">Inbox</text>
        <text x="140" y="0" font-size="11">Review</text>
      </g>
    </g>
  </g>
</svg>
